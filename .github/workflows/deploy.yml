name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: zaryatest
          POSTGRES_USER: zaryatest
          POSTGRES_PASSWORD: zaryatest
        options: >-
          --health-cmd pg_isready -U zaryatest
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck
        env:
          DATABASE_URL: postgresql://zaryatest:zaryatest@localhost:5432/zaryatest
          BOT_TOKEN: test
          TRAVELPAYOUTS_TOKEN: test
          POSTGRES_PASSWORD: test
          BOT_ADMIN_ID: 0

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://zaryatest:zaryatest@localhost:5432/zaryatest

      - name: Run migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://zaryatest:zaryatest@localhost:5432/zaryatest

      - name: Test
        run: npm test
        env:
          DATABASE_URL: postgresql://zaryatest:zaryatest@localhost:5432/zaryatest
          BOT_TOKEN: test
          TRAVELPAYOUTS_TOKEN: test
          POSTGRES_PASSWORD: test
          BOT_ADMIN_ID: 0

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/tg-zarya-bot:latest

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/tg-zarya-bot
            docker compose pull
            docker compose up -d --force-recreate
            docker image prune -f
